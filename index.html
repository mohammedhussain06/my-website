<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Profile Card</title>
    <style>
        /* CSS: The "Makeup" and Layout */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #6c63ff;
            margin-bottom: 15px;
        }

        h2 { margin: 10px 0 5px; color: #333; }
        p { color: #666; line-height: 1.5; }

        .btn {
            background-color: #6c63ff;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }

        /* Responsive Adjustment for small screens */
        @media (max-width: 480px) {
            .card { padding: 15px; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=400" 
             alt="Profile Picture" class="profile-img">
        <h2 id="userName">Jane Doe</h2>
        <p id="userBio">UI/UX Designer & Tech Enthusiast. I love creating beautiful interfaces and solving complex problems with simple code.</p>
        <button class="btn" onclick="toggleFollow()">Follow</button>
    </div>

    <script>
        function toggleFollow() {
            const btn = document.querySelector('.btn');
            if (btn.innerText === "Follow") {
                btn.innerText = "Following";
                btn.style.backgroundColor = "#2ecc71";
            } else {
                btn.innerText = "Follow";
                btn.style.backgroundColor = "#6c63ff";
            }
        }
    </script>

</body>
</html>
